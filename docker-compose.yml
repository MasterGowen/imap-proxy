version: '3.8'

services:
  imap-proxy:
    image: haproxy:2.8-alpine
    container_name: imap-proxy
    restart: unless-stopped
    ports:
      # КРИТИЧНО: только 127.0.0.1 — порт не выходит наружу,
      # доступен только для SSH-туннеля и локальных потребителей в Docker-сети
      - "127.0.0.1:10993:10993"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - platform_network
    labels:
      - "platform.managed=true"
      - "platform.service=imap-proxy"
      - "platform.version=1.0.0"
      - "platform.visibility=internal"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: 0.1

networks:
  platform_network:
    external: true
    name: platform_network
