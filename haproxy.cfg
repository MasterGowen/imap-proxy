# HAProxy конфигурация для TCP-проксирования IMAP-трафика.
# Точка входа: localhost:10993 (SSH Remote Forwarding).
# Точка выхода: почтовый контейнер:993 (IMAP over TLS).
#
# ⚠️ ${MAIL_CONTAINER_NAME} нужно заменить на реальное имя контейнера
#    перед записью файла (HAProxy не поддерживает env-переменные).

global
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend imaps_front
    bind *:10993
    default_backend imaps_back

backend imaps_back
    server mail ${MAIL_CONTAINER_NAME}:993
